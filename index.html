<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍅 Pomodoro</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #fdf6f0;
    --card:     #fff;
    --accent:   #f4845f;
    --accent2:  #fbbf24;
    --text:     #3d2c2c;
    --muted:    #b09a9a;
    --ring:     #f4845f;
    --ring-bg:  #fde8df;
    --shadow:   rgba(244,132,95,0.18);
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 0;
    transition: background 0.6s ease;
    overflow: hidden;
  }

  /* ── floating blobs ── */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    opacity: 0.35;
    pointer-events: none;
    transition: background 0.8s ease;
    animation: blob-drift ease-in-out infinite alternate;
  }
  .blob-1 { width: 420px; height: 420px; background: #fbbf24; top: -140px; left: -100px; animation-duration: 11s; }
  .blob-2 { width: 360px; height: 360px; background: #f4845f; bottom: -120px; right: -80px; animation-duration: 14s; }
  .blob-3 { width: 260px; height: 260px; background: #fda4af; top: 45%; left: 60%; animation-duration: 9s; }
  @keyframes blob-drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(30px,20px) scale(1.08); }
  }

  /* ── card ── */
  .card {
    background: var(--card);
    border-radius: 32px;
    padding: 28px 36px 28px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 24px 64px var(--shadow), 0 2px 8px rgba(0,0,0,0.04);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    position: relative;
    z-index: 1;
    transition: box-shadow 0.6s ease;
  }

  /* ── title ── */
  .title {
    font-size: 1.1rem;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── mode tabs ── */
  .tabs {
    display: flex;
    gap: 6px;
    background: #f7f0ec;
    border-radius: 14px;
    padding: 5px;
    width: 100%;
  }
  .tab {
    flex: 1;
    border: none;
    background: none;
    border-radius: 10px;
    padding: 7px 4px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.72rem;
    font-weight: 800;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .tab.active {
    background: var(--card);
    color: var(--accent);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  /* ── illustration ── */
  .illustration {
    width: 220px;
    height: 180px;
    position: relative;
  }
  .scene { position: absolute; inset: 0; transition: opacity 0.5s ease; }
  .scene.hidden { opacity: 0; pointer-events: none; }

  /* breathing animation on the character */
  .breathe {
    animation: breathe 3.5s ease-in-out infinite;
    transform-origin: bottom center;
  }
  @keyframes breathe {
    0%,100% { transform: translateY(0) scale(1,1); }
    50%      { transform: translateY(-3px) scale(1.01,0.99); }
  }

  /* tail wag */
  .tail-wag {
    animation: tail 1.2s ease-in-out infinite alternate;
    transform-origin: top left;
  }
  @keyframes tail {
    from { transform: rotate(-12deg); }
    to   { transform: rotate(12deg); }
  }

  /* eye blink */
  .blink {
    animation: blink 4s ease-in-out infinite;
  }
  @keyframes blink {
    0%,92%,100% { transform: scaleY(1); }
    95%          { transform: scaleY(0.08); }
  }

  /* steam */
  .steam {
    animation: steam-rise 2s ease-in-out infinite;
    opacity: 0.5;
  }
  .steam-2 { animation-delay: 0.6s; }
  .steam-3 { animation-delay: 1.1s; }
  @keyframes steam-rise {
    0%   { transform: translateY(0) scaleX(1); opacity: 0.5; }
    100% { transform: translateY(-14px) scaleX(1.4); opacity: 0; }
  }

  /* zzz float */
  .zzz { animation: zzz-float 2.4s ease-in-out infinite; }
  .zzz-2 { animation: zzz-float 2.4s ease-in-out infinite; animation-delay: 0.7s; }
  .zzz-3 { animation: zzz-float 2.4s ease-in-out infinite; animation-delay: 1.4s; }
  @keyframes zzz-float {
    0%   { opacity: 0; transform: translate(0,0) scale(0.7); }
    30%  { opacity: 1; }
    100% { opacity: 0; transform: translate(14px,-22px) scale(1.1); }
  }

  /* star twinkle */
  .twinkle { animation: twinkle 1.8s ease-in-out infinite alternate; }
  .twinkle-2 { animation: twinkle 1.8s ease-in-out infinite alternate; animation-delay: 0.6s; }
  .twinkle-3 { animation: twinkle 1.8s ease-in-out infinite alternate; animation-delay: 1.1s; }
  @keyframes twinkle {
    from { opacity: 0.3; transform: scale(0.8); }
    to   { opacity: 1;   transform: scale(1.2); }
  }

  /* pencil write */
  .pencil-write {
    animation: write 1s ease-in-out infinite alternate;
    transform-origin: bottom center;
  }
  @keyframes write {
    from { transform: rotate(-8deg) translateX(-2px); }
    to   { transform: rotate(8deg)  translateX(2px); }
  }

  /* ── timer ring ── */
  .timer-wrap {
    position: relative;
    width: 190px;
    height: 190px;
  }
  .ring-svg {
    transform: rotate(-90deg);
  }
  .ring-bg-circle {
    fill: none;
    stroke: var(--ring-bg);
    stroke-width: 10;
    transition: stroke 0.6s ease;
  }
  .ring-progress {
    fill: none;
    stroke: var(--ring);
    stroke-width: 10;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.6s ease;
  }
  .timer-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }
  .timer-display {
    font-size: 3rem;
    font-weight: 900;
    color: var(--text);
    letter-spacing: 2px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .timer-label {
    font-size: 0.68rem;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── controls ── */
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .btn-main {
    background: linear-gradient(135deg, var(--accent), #f97316);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1rem;
    border: none;
    border-radius: 16px;
    padding: 14px 44px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(244,132,95,0.45);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.5px;
  }
  .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(244,132,95,0.55); }
  .btn-main:active { transform: translateY(0); }

  .btn-icon {
    background: #f7f0ec;
    border: none;
    border-radius: 12px;
    width: 46px; height: 46px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    color: var(--muted);
  }
  .btn-icon:hover { background: #ede5e0; transform: scale(1.08); }

  /* ── sessions ── */
  .sessions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .session-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--ring-bg);
    transition: background 0.3s, transform 0.3s;
  }
  .session-dot.done {
    background: var(--accent);
    transform: scale(1.15);
  }
  .sessions-label {
    font-size: 0.72rem;
    font-weight: 800;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-left: 4px;
  }

  /* ── mode colour themes ── */
  body.mode-work    { --bg: #fdf6f0; --accent: #f4845f; --ring: #f4845f; --ring-bg: #fde8df; --shadow: rgba(244,132,95,0.18); }
  body.mode-short   { --bg: #f0fdf6; --accent: #34d399; --ring: #34d399; --ring-bg: #d1fae5; --shadow: rgba(52,211,153,0.15); }
  body.mode-long    { --bg: #f5f0ff; --accent: #a78bfa; --ring: #a78bfa; --ring-bg: #ede9fe; --shadow: rgba(167,139,250,0.18); }

  body.mode-work  .blob-1 { background: #fbbf24; }
  body.mode-work  .blob-2 { background: #f4845f; }
  body.mode-work  .blob-3 { background: #fda4af; }
  body.mode-short .blob-1 { background: #6ee7b7; }
  body.mode-short .blob-2 { background: #34d399; }
  body.mode-short .blob-3 { background: #a7f3d0; }
  body.mode-long  .blob-1 { background: #c4b5fd; }
  body.mode-long  .blob-2 { background: #a78bfa; }
  body.mode-long  .blob-3 { background: #ddd6fe; }

  body.mode-work  .tab.active { color: #f4845f; }
  body.mode-short .tab.active { color: #34d399; }
  body.mode-long  .tab.active { color: #a78bfa; }

  body.mode-work  .btn-main { background: linear-gradient(135deg, #f4845f, #f97316); box-shadow: 0 6px 20px rgba(244,132,95,0.45); }
  body.mode-short .btn-main { background: linear-gradient(135deg, #34d399, #059669); box-shadow: 0 6px 20px rgba(52,211,153,0.4); }
  body.mode-long  .btn-main { background: linear-gradient(135deg, #a78bfa, #7c3aed); box-shadow: 0 6px 20px rgba(167,139,250,0.45); }

  /* ── plant stages ── */
  .plant-stage { transition: opacity 0.6s ease; }
  .plant-stage.hidden { opacity: 0; pointer-events: none; }

  /* ── weather effects ── */
  .weather-fx { transition: opacity 0.5s ease; }
  .weather-fx.hidden { opacity: 0; pointer-events: none; }

  @keyframes rain-fall {
    0%   { transform: translateY(0px);   opacity: 0; }
    8%   { opacity: 0.7; }
    90%  { opacity: 0.7; }
    100% { transform: translateY(185px); opacity: 0; }
  }
  @keyframes cloud-drift {
    0%,100% { transform: translateX(0px); }
    50%     { transform: translateX(16px); }
  }
  @keyframes sun-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes lightning-flash {
    0%,76%,100% { opacity: 0; }
    78%,82%     { opacity: 1; }
    80%,84%     { opacity: 0.1; }
  }
  @keyframes golden-glow {
    0%,100% { opacity: 0.3; transform: scale(1);   }
    50%     { opacity: 0.6; transform: scale(1.1); }
  }

  /* ── bee wings ── */
  @keyframes wing-flutter-l {
    from { transform: rotate(-6deg);  }
    to   { transform: rotate(-38deg); }
  }
  @keyframes wing-flutter-r {
    from { transform: rotate(6deg);  }
    to   { transform: rotate(38deg); }
  }
  @keyframes bee-float {
    0%,100% { transform: translateY(0px); }
    50%     { transform: translateY(-6px); }
  }

  /* ── boost button ── */
  @keyframes pop-in {
    from { opacity: 0; transform: scale(0.9) translateY(6px); }
    to   { opacity: 1; transform: scale(1)   translateY(0);   }
  }
  .boost-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  .boost-quote {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--accent);
    text-align: center;
    padding: 10px 18px;
    background: var(--ring-bg);
    border-radius: 16px;
    line-height: 1.55;
    max-width: 270px;
    animation: pop-in 0.35s ease;
  }
  .btn-boost {
    background: none;
    border: 2px solid var(--ring-bg);
    border-radius: 20px;
    padding: 7px 22px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.78rem;
    font-weight: 800;
    color: var(--accent);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .btn-boost:hover { background: var(--ring-bg); transform: scale(1.05); }

  /* ── lifetime counter ── */
  .lifetime-label {
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* notification pulse when timer ends */
  @keyframes done-pulse {
    0%,100% { transform: scale(1); }
    25%      { transform: scale(1.04); }
    50%      { transform: scale(0.97); }
    75%      { transform: scale(1.02); }
  }
  .card.done-pulse { animation: done-pulse 0.5s ease 3; }
</style>
</head>
<body class="mode-work">

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="card" id="card">

  <div class="title">Pomodoro</div>

  <!-- mode tabs -->
  <div class="tabs">
    <button class="tab active" onclick="setMode('work')"   id="tab-work">Focus</button>
    <button class="tab"        onclick="setMode('short')"  id="tab-short">Short break</button>
    <button class="tab"        onclick="setMode('long')"   id="tab-long">Long break</button>
  </div>

  <!-- illustration -->
  <div class="illustration">

    <!-- WORK SCENE: growing plant + weather -->
    <svg class="scene" id="scene-work" viewBox="0 0 220 180" fill="none" xmlns="http://www.w3.org/2000/svg">

      <!-- sky tint (color updated by JS) -->
      <rect id="sky-bg" x="0" y="0" width="220" height="180" rx="12" fill="#dbeafe" opacity="0.22"/>

      <!-- WEATHER: sunny -->
      <g class="weather-fx" id="weather-sunny">
        <circle cx="30" cy="26" r="14" fill="#fbbf24" opacity="0.9"/>
        <g style="transform-origin:30px 26px; animation:sun-spin 9s linear infinite">
          <line x1="30" y1="5"  x2="30" y2="1"  stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="30" y1="47" x2="30" y2="51" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="9"  y1="26" x2="5"  y2="26" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="51" y1="26" x2="55" y2="26" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>

          <line x1="45" y1="11" x2="48" y2="8"  stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="15" y1="41" x2="12" y2="44" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
        </g>
        <ellipse cx="180" cy="28" rx="18" ry="8"  fill="#fff" opacity="0.6" style="animation:cloud-drift 7s ease-in-out infinite"/>
        <ellipse cx="166" cy="33" rx="11" ry="7"  fill="#fff" opacity="0.6" style="animation:cloud-drift 7s ease-in-out infinite"/>
        <ellipse cx="194" cy="33" rx="11" ry="7"  fill="#fff" opacity="0.6" style="animation:cloud-drift 7s ease-in-out infinite"/>

      <!-- WEATHER: cloudy -->

        <g style="animation:cloud-drift 6s ease-in-out infinite">

          <ellipse cx="38"  cy="33" rx="16" ry="11" fill="#e2e8f0" opacity="0.85"/>
          <ellipse cx="72"  cy="33" rx="16" ry="11" fill="#e2e8f0" opacity="0.85"/>

          <ellipse cx="97"  cy="21" rx="12" ry="8" fill="#e2e8f0" opacity="0.6"/>
          <ellipse cx="127" cy="21" rx="12" ry="8" fill="#e2e8f0" opacity="0.6"/>
        </g>
      </g>

      <!-- WEATHER: rainy -->
      <g class="weather-fx hidden" id="weather-rainy">
        <ellipse cx="75"  cy="22" rx="32" ry="14" fill="#94a3b8" opacity="0.75"/>
        <ellipse cx="52"  cy="28" rx="18" ry="11" fill="#94a3b8" opacity="0.75"/>

        <line x1="95"  y1="39" x2="91"  y2="52" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round" style="animation:rain-fall 1.05s linear infinite; animation-delay:-0.2s"/>
        <line x1="115" y1="42" x2="111" y2="55" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round" style="animation:rain-fall 1.3s  linear infinite; animation-delay:-0.9s"/>

        <line x1="175" y1="39" x2="171" y2="52" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round" style="animation:rain-fall 1.0s  linear infinite; animation-delay:-0.1s"/>
        <line x1="45"  y1="50" x2="41"  y2="63" stroke="#93c5fd" stroke-width="1"   stroke-linecap="round" style="animation:rain-fall 0.9s  linear infinite; animation-delay:-0.5s"/>
        <line x1="85"  y1="47" x2="81"  y2="60" stroke="#93c5fd" stroke-width="1"   stroke-linecap="round" style="animation:rain-fall 1.2s  linear infinite; animation-delay:-0.8s"/>
        <line x1="125" y1="46" x2="121" y2="59" stroke="#93c5fd" stroke-width="1"   stroke-linecap="round" style="animation:rain-fall 0.95s linear infinite; animation-delay:-0.35s"/>
        <line x1="165" y1="46" x2="161" y2="59" stroke="#93c5fd" stroke-width="1"   stroke-linecap="round" style="animation:rain-fall 1.1s  linear infinite; animation-delay:-0.65s"/>
        <line x1="200" y1="44" x2="196" y2="57" stroke="#93c5fd" stroke-width="1"   stroke-linecap="round" style="animation:rain-fall 1.05s linear infinite; animation-delay:-0.15s"/>
      </g>

      <!-- WEATHER: stormy -->
      <g class="weather-fx hidden" id="weather-stormy">
        <rect x="0" y="0" width="220" height="180" fill="#0f172a" opacity="0.18"/>
        <ellipse cx="85"  cy="20" rx="42" ry="17" fill="#475569" opacity="0.9"/>
        <ellipse cx="58"  cy="27" rx="24" ry="13" fill="#475569" opacity="0.9"/>
        <ellipse cx="112" cy="27" rx="24" ry="13" fill="#475569" opacity="0.9"/>
        <ellipse cx="170" cy="17" rx="34" ry="15" fill="#64748b" opacity="0.8"/>
        <path d="M150 28 L140 52 L147 52 L134 78" stroke="#fef08a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" style="animation:lightning-flash 3.5s ease-in-out infinite"/>
        <line x1="25"  y1="42" x2="21"  y2="55" stroke="#bfdbfe" stroke-width="1.5" stroke-linecap="round" style="animation:rain-fall 0.75s linear infinite; animation-delay:0s"/>
        <line x1="45"  y1="38" x2="41"  y2="51" stroke="#bfdbfe" stroke-width="1.5" stroke-linecap="round" style="animation:rain-fall 0.7s  linear infinite; animation-delay:-0.15s"/>
        <line x1="65"  y1="40" x2="61"  y2="53" stroke="#bfdbfe" stroke-width="1.5" stroke-linecap="round" style="animation:rain-fall 0.8s  linear infinite; animation-delay:-0.3s"/>

<script>
  const MODES = {
    work:  { minutes: 25, label: 'Focus time',    scene: 'work',  bodyClass: 'mode-work'  },
    short: { minutes: 5,  label: 'Short break',   scene: 'short', bodyClass: 'mode-short' },
    long:  { minutes: 15, label: 'Long break',    scene: 'long',  bodyClass: 'mode-long'  },
  };

  const CIRCUMFERENCE = 2 * Math.PI * 80; // 502.65

  let mode        = 'work';
  let totalSecs   = 25 * 60;
  let remaining   = totalSecs;
  let running     = false;
  let interval    = null;
  let sessions    = 0; // completed focus sessions

  const ring        = document.getElementById('ring');
  const timerEl     = document.getElementById('timer');
  const labelEl     = document.getElementById('timer-label');
  const btnStart    = document.getElementById('btn-start');
  const card        = document.getElementById('card');

  function setMode(m, autoStart = false) {
    mode = m;
    clearInterval(interval);
    running = false;
    btnStart.textContent = 'Start';

    const cfg = MODES[m];
    totalSecs = cfg.minutes * 60;
    remaining = totalSecs;

    // tabs
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + m).classList.add('active');

    // body theme
    document.body.className = cfg.bodyClass;

    // scene
    document.querySelectorAll('.scene').forEach(s => s.classList.add('hidden'));
    document.getElementById('scene-' + cfg.scene).classList.remove('hidden');

    labelEl.textContent = cfg.label;
    updateDisplay();
    updateRing();
    document.querySelectorAll('.blob').forEach(b => b.style.background = '');
    if (m === 'work') { resetPlant(); updateGreenness(); }
    toggleBoostWrap(m !== 'work');
  }

  function toggleTimer() {
    if (running) {
      clearInterval(interval);
      running = false;
      btnStart.textContent = 'Resume';
    } else {
      running = true;
      btnStart.textContent = 'Pause';
      interval = setInterval(tick, 1000);
    }
  }

  function tick() {
    if (remaining <= 0) {
      clearInterval(interval);
      running = false;
      btnStart.textContent = 'Start';
      onTimerEnd();
      return;
    }
    remaining--;
    updateDisplay();
    updateRing();
    if (mode === 'work') { updatePlantStage(); checkWeatherChange(); }
  }

  function updateDisplay() {
    const m = Math.floor(remaining / 60).toString().padStart(2, '0');
    const s = (remaining % 60).toString().padStart(2, '0');
    timerEl.textContent = `${m}:${s}`;
    document.title = `${m}:${s} · ${MODES[mode].label}`;
  }

  function updateRing() {
    const pct = remaining / totalSecs;
    ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);
  }

  function resetTimer() {
    clearInterval(interval);
    running = false;
    remaining = totalSecs;
    btnStart.textContent = 'Start';
    updateDisplay();
    updateRing();
    if (mode === 'work') resetPlant();
  }

  function skipSession() {
    clearInterval(interval);
    running = false;
    remaining = 0;
    updateDisplay();
    updateRing();
    onTimerEnd();
  }

  function onTimerEnd() {
    // pulse card
    card.classList.remove('done-pulse');
    void card.offsetWidth;
    card.classList.add('done-pulse');
    card.addEventListener('animationend', () => card.classList.remove('done-pulse'), { once: true });

    // notify
    if (Notification.permission === 'granted') {
      new Notification(mode === 'work' ? '🌳 Tree grown! Time for a break!' : '✨ Back to focus!', {
        body: mode === 'work' ? 'Your plant is fully grown! Take a rest.' : 'Break over — let\'s grow!',
        silent: false,
      });
    }

    // advance
    if (mode === 'work') {
      lifetimeSessions++;
      localStorage.setItem('pomo_lifetime', lifetimeSessions);
      updateLifetimeLabel();
      sessions = Math.min(sessions + 1, 4);
      updateDots();
      setTimeout(() => {
        if (sessions >= 4) { sessions = 0; updateDots(); setMode('long'); }
        else { setMode('short'); }
      }, 1400);
    } else {
      setMode('work');
    }
  }

  function updateDots() {
    for (let i = 0; i < 4; i++) {
      document.getElementById('dot-' + i).classList.toggle('done', i < sessions);
    }
    const s = sessions % 4 || (sessions === 0 ? 1 : 4);
    document.getElementById('sessions-label').textContent =
      sessions >= 4 ? 'Set complete! 🎉' : `Session ${sessions + 1} of 4`;
  }

  // request notification permission on first interact
  document.addEventListener('click', () => {
    if (Notification.permission === 'default') Notification.requestPermission();
  }, { once: true });

  // init
  updateDisplay();
  updateRing();

  // ── Plant & Weather ─────────────────────────────────────────
  const PLANT_THRESHOLDS = [0, 5*60, 10*60, 15*60, 20*60];
  const WEATHERS = ['sunny', 'cloudy', 'rainy', 'stormy', 'golden'];
  const SKY_TINTS = {
    sunny:  ['#dbeafe', 0.22],
    cloudy: ['#e2e8f0', 0.18],
    rainy:  ['#bfdbfe', 0.22],
    stormy: ['#334155', 0.28],
    golden: ['#fed7aa', 0.28],
  };

  let currentPlantStage = 0;
  let lastWeatherSlot   = 0;
  let lifetimeSessions  = parseInt(localStorage.getItem('pomo_lifetime') || '0');

  function updatePlantStage() {
    const elapsed = totalSecs - remaining;
    let stage = 0;
    for (let i = PLANT_THRESHOLDS.length - 1; i >= 0; i--) {
      if (elapsed >= PLANT_THRESHOLDS[i]) { stage = i; break; }
    }
    if (stage !== currentPlantStage) {
      document.getElementById('plant-' + currentPlantStage).classList.add('hidden');
      document.getElementById('plant-' + stage).classList.remove('hidden');
      currentPlantStage = stage;
    }
  }

  function checkWeatherChange() {
    const slot = Math.floor((totalSecs - remaining) / (5 * 60));
    if (slot !== lastWeatherSlot) { lastWeatherSlot = slot; pickWeather(); }
  }

  function pickWeather() {
    applyWeather(WEATHERS[Math.floor(Math.random() * WEATHERS.length)]);
  }

  function applyWeather(w) {
    document.querySelectorAll('.weather-fx').forEach(el => el.classList.add('hidden'));
    const el = document.getElementById('weather-' + w);
    if (el) el.classList.remove('hidden');
    const sky = document.getElementById('sky-bg');
    if (sky && SKY_TINTS[w]) {
      sky.setAttribute('fill', SKY_TINTS[w][0]);
      sky.setAttribute('opacity', SKY_TINTS[w][1]);
    }
  }

  function resetPlant() {
    document.querySelectorAll('.plant-stage').forEach((el, i) => {
      el.classList.toggle('hidden', i !== 0);
    });
    currentPlantStage = 0;
    lastWeatherSlot   = 0;
    pickWeather();
  }

  function updateGreenness() {
    const t = Math.min(lifetimeSessions / 20, 1);
    document.querySelector('.blob-1').style.background = lerpColor('#fbbf24', '#86efac', t);
    document.querySelector('.blob-2').style.background = lerpColor('#f4845f', '#4ade80', t);
    document.querySelector('.blob-3').style.background = lerpColor('#fda4af', '#bbf7d0', t);
  }

  function lerpColor(a, b, t) {
    const p = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
    const [ar,ag,ab] = p(a), [br,bg,bb] = p(b);
    return `rgb(${Math.round(ar+(br-ar)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;
  }

  function updateLifetimeLabel() {
    const el = document.getElementById('lifetime-label');
    if (el) el.textContent = `🌱 ${lifetimeSessions} tree${lifetimeSessions !== 1 ? 's' : ''} grown`;
  }

  // plant/weather/greenness init
  resetPlant();
  updateGreenness();
  updateLifetimeLabel();

  // ── Boost button ─────────────────────────────────────────────
  const BOOST_QUOTES = [
    "Rest is part of growth — even trees need rain! 🌧️",
    "You're doing amazing. The whole forest is proud. 🌲",
    "A rested mind blooms brighter. 🌸",
    "Every break makes the next focus stronger! 💪",
    "Nature grows in cycles. So do you. 🌿",
    "Small steps, deep roots, big growth. ✨",
    "Breathe in. You earned this moment. 🌬️",
    "The best trees take time to grow — so do you! 🌳",
    "You're one session closer to a full tree! 🏆",
    "Even bees rest between flowers. You're doing it right! 🐝",
    "Growth happens in the quiet moments too. 🌱",
    "You're planting seeds of progress. Keep going! 🌻",
    "The forest didn't grow in a day — and neither do great things. 🍃",
    "Rest now, shine later. You've got this. ⭐",
  ];

  function showBoost() {
    const el = document.getElementById('boost-quote');
    el.textContent = BOOST_QUOTES[Math.floor(Math.random() * BOOST_QUOTES.length)];
    el.style.display = 'block';
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = 'pop-in 0.35s ease';
  }

  function toggleBoostWrap(show) {
    const wrap = document.getElementById('boost-wrap');
    if (!wrap) return;
    wrap.style.display = show ? 'flex' : 'none';
    const q = document.getElementById('boost-quote');
    if (q) q.style.display = 'none';
  }
</script>
</body>
</html>
